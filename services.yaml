generate_image:
  name: 生成图像
  description: 使用SiliconFlow图像生成模型生成图像（需要SiliconFlow API密钥）
  fields:
    prompt:
      name: 提示词
      description: 描述要生成的图像内容
      required: true
      example: "一只可爱的猫咪坐在窗台上看夕阳"
      selector:
        text:
          multiline: true
    size:
      name: 图像尺寸
      description: 生成图像的尺寸
      required: false
      default: "1024x1024"
      selector:
        select:
          options:
            - "1024x1024"
            - "768x1344"
            - "864x1152"
            - "1344x768"
            - "1152x864"
            - "1440x720"
            - "720x1440"
    model:
      name: 模型
      description: 使用的图像生成模型
      required: false
      default: "Kwai-Kolors/Kolors"
      selector:
        select:
          options:
            - "Kwai-Kolors/Kolors"
            - "black-forest-labs/FLUX.1-schnell"

analyze_image:
  name: 分析图像
  description: 使用SiliconFlow分析图像内容（需要SiliconFlow API密钥）
  fields:
    image_file:
      name: 图像文件
      description: 要分析的图像文件路径
      required: false
      selector:
        text:
    image_entity:
      name: 图像实体
      description: 要分析的摄像头实体ID
      required: false
      selector:
        entity:
          domain: camera
    message:
      name: 分析指令
      description: 告诉AI如何分析这张图像
      required: true
      example: "请描述这张图片中的内容"
      selector:
        text:
          multiline: true
    model:
      name: 模型
      description: 使用的图像分析模型
      required: false
      default: "THUDM/GLM-4.1V-9B-Thinking"
      selector:
        select:
          options:
            - "THUDM/GLM-4.1V-9B-Thinking"
            - "Qwen/Qwen2-VL-72B-Instruct"
            - "Qwen/Qwen2-VL-7B-Instruct"
    temperature:
      name: 温度
      description: 控制输出的随机性，值越高输出越随机
      required: false
      default: 0.7
      selector:
        number:
          min: 0
          max: 1
          step: 0.1
    max_tokens:
      name: 最大令牌数
      description: 限制回答的最大长度
      required: false
      default: 1024
      selector:
        number:
          min: 1
          max: 4096
    stream:
      name: 流式输出
      description: 是否启用流式输出
      required: false
      default: false
      selector:
        boolean:

create_automation:
  name: 创建自动化
  description: 通过自然语言描述创建Home Assistant自动化
  fields:
    description:
      name: 自动化描述
      description: 描述你想要的自动化行为，例如"当检测到有人移动时打开客厅的灯"
      required: true
      example: "每天晚上8点自动关闭所有灯光"
      selector:
        text:
          multiline: true
    name:
      name: 自动化名称
      description: 为自动化指定一个名称
      required: false
      example: "晚间关灯自动化"
      selector:
        text:
    area_id:
      name: 区域ID
      description: 指定自动化相关的区域
      required: false
      example: "living_room"
      selector:
        text:

stt_transcribe:
  name: 语音转文本
  description: 使用SiliconFlow将语音文件转换为文本（需要Silicon Flow API密钥）
  fields:
    file:
      name: 音频文件
      description: 要转录的音频文件路径
      required: true
      selector:
        text:
    model:
      name: 模型
      description: 使用的STT模型
      required: false
      default: "FunAudioLLM/SenseVoiceSmall"
      selector:
        select:
          options:
            - "FunAudioLLM/SenseVoiceSmall"
            - "TeleAI/TeleSpeechASR"
    language:
      name: 语言
      description: 指定语言（HA 2025.12+ auto=自动检测）
      required: false
      default: "auto"
      selector:
        select:
          options:
            - "auto"
            - "zh-CN"
            - "en-US"
            - "ja-JP"
            - "ko-KR"

tts_say:
  name: 文字转语音
  description: 使用Edge TTS生成语音，支持流式和非流式两种模式
  fields:
    text:
      name: 文本内容
      description: 要转换为语音的文本内容
      required: true
      example: "你好，欢迎使用文字转语音服务"
      selector:
        text:
          multiline: true
    voice:
      name: 语音
      description: 选择语音类型
      required: false
      default: "zh-CN-XiaoxiaoNeural"
      selector:
        select:
          options:
            - "zh-CN-XiaoxiaoNeural"
            - "zh-CN-XiaoyiNeural"
            - "zh-CN-YunjianNeural"
            - "zh-CN-YunxiNeural"
            - "zh-CN-YunxiaNeural"
            - "zh-CN-YunyangNeural"
            - "zh-HK-HiuGaaiNeural"
            - "zh-HK-HiuMaanNeural"
            - "zh-HK-WanLungNeural"
            - "zh-TW-HsiaoChenNeural"
            - "zh-TW-YunJheNeural"
            - "zh-TW-HsiaoYuNeural"
            - "en-US-JennyNeural"
            - "en-US-GuyNeural"
            - "en-GB-SoniaNeural"
            - "en-GB-RyanNeural"
            - "ja-JP-NanamiNeural"
            - "ja-JP-KeitaNeural"
            - "ko-KR-SunHiNeural"
            - "ko-KR-InJoonNeural"
    quality:
      name: 质量
      description: 语音质量（HA 2025.10+）
      required: false
      default: "default"
      selector:
        select:
          options:
            - "default"
            - "high"
            - "medium"
            - "low"
    media_player_entity:
      name: 媒体播放器
      description: 指定用于播放生成的语音的媒体播放器实体ID（可选）
      required: false
      selector:
        entity:
          domain: media_player
    stream:
      name: 流式输出
      description: 启用流式输出模式，音频通过事件总线实时推送（需监听ai_hub_tts_stream_chunk事件）
      required: false
      default: false
      selector:
        boolean:
    chunk_size:
      name: 块大小
      description: 流式模式下的音频块大小（字节），达到此大小时推送事件
      required: false
      default: 4096
      selector:
        number:
          min: 1024
          max: 32768
          step: 1024
