generate_image:
  name: 生成图像
  description: 使用指定的图像生成子配置生成图像。
  fields:
    config_entry_id:
      name: 配置项 ID
      description: 有多个 HA AI 配置项时可指定。
      required: false
      selector:
        text:
    subentry_id:
      name: 子配置 ID
      description: 指定图像生成子配置。留空时使用第一个图像生成子配置。
      required: false
      selector:
        text:
    prompt:
      name: 提示词
      description: 描述要生成的图像内容。
      required: true
      selector:
        text:
          multiline: true
    size:
      name: 图像尺寸
      description: 生成图像的尺寸。
      required: false
      default: "1024x1024"
      selector:
        select:
          options:
            - "1024x1024"
            - "768x1344"
            - "864x1152"
            - "1344x768"
            - "1152x864"
            - "1440x720"
            - "720x1440"
    model:
      name: 模型
      description: 图像生成模型，可填写当前平台支持的任意模型名。
      required: false
      default: "gpt-image-1"
      selector:
        text:

analyze_image:
  name: 分析图像
  description: 使用指定的对话/视觉子配置分析图像内容。
  fields:
    config_entry_id:
      name: 配置项 ID
      description: 有多个 HA AI 配置项时可指定。
      required: false
      selector:
        text:
    subentry_id:
      name: 子配置 ID
      description: 指定对话/视觉子配置。留空时使用第一个对话子配置。
      required: false
      selector:
        text:
    image_file:
      name: 图像文件
      description: 要分析的图像文件路径。
      required: false
      selector:
        text:
    image_entity:
      name: 图像实体
      description: 要分析的摄像头实体 ID。
      required: false
      selector:
        entity:
          domain: camera
    message:
      name: 分析指令
      description: 告诉 AI 如何分析这张图像。
      required: true
      selector:
        text:
          multiline: true
    model:
      name: 模型
      description: 图像分析模型，可填写当前平台支持的任意模型名。
      required: false
      default: "gpt-4o-mini"
      selector:
        text:
    temperature:
      name: 温度
      description: 控制输出随机性。
      required: false
      default: 0.7
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
    max_tokens:
      name: 最大令牌数
      description: 限制最大响应长度。
      required: false
      default: 1024
      selector:
        number:
          min: 1
          max: 4096
    stream:
      name: 流式输出
      description: 启用流式输出。
      required: false
      default: false
      selector:
        boolean:

create_automation:
  name: 创建自动化
  description: 通过自然语言描述创建 Home Assistant 自动化，使用当前配置的对话子配置。
  fields:
    description:
      name: 自动化描述
      description: 描述想要的自动化行为。
      required: true
      selector:
        text:
          multiline: true
    name:
      name: 自动化名称
      description: 为自动化指定名称。
      required: false
      selector:
        text:
    area_id:
      name: 区域 ID
      description: 指定自动化相关的区域。
      required: false
      selector:
        text:

stt_transcribe:
  name: 语音转文字
  description: 使用指定的 STT 子配置将音频文件转换为文本。
  fields:
    config_entry_id:
      name: 配置项 ID
      description: 有多个 HA AI 配置项时可指定。
      required: false
      selector:
        text:
    subentry_id:
      name: 子配置 ID
      description: 指定 STT 子配置。留空时使用第一个 STT 子配置。
      required: false
      selector:
        text:
    file:
      name: 音频文件
      description: 要转录的音频文件路径。
      required: true
      selector:
        text:
    model:
      name: 模型
      description: STT 模型，可填写当前平台支持的任意模型名。
      required: false
      default: "whisper-1"
      selector:
        text:

tts_say:
  name: 文字转语音
  description: 使用指定的 TTS 子配置生成语音，Edge TTS 免费选项仍然可用。
  fields:
    config_entry_id:
      name: 配置项 ID
      description: 有多个 HA AI 配置项时可指定。
      required: false
      selector:
        text:
    subentry_id:
      name: 子配置 ID
      description: 指定 TTS 子配置。留空时使用第一个 TTS 子配置。
      required: false
      selector:
        text:
    text:
      name: 文本内容
      description: 要转换为语音的文本内容。
      required: true
      selector:
        text:
          multiline: true
    voice:
      name: 语音
      description: 当前平台使用的语音名称。
      required: false
      default: "zh-CN-XiaoxiaoNeural"
      selector:
        text:
    media_player_entity:
      name: 媒体播放器
      description: 用于播放生成语音的媒体播放器实体。
      required: false
      selector:
        entity:
          domain: media_player
    stream:
      name: 流式输出
      description: 通过事件总线推送音频块。
      required: false
      default: false
      selector:
        boolean:
    chunk_size:
      name: 块大小
      description: 流式模式下的音频块大小，单位字节。
      required: false
      default: 4096
      selector:
        number:
          min: 1024
          max: 32768
          step: 1024

follow_up_playback_done:
  name: 追问播放完成
  description: ESP32 或播放器在追问 TTS 播放完成后调用，HA AI 会发出继续监听事件。
  fields:
    pending_id:
      name: 追问 ID
      description: HA AI 创建的 pending_id。推荐 ESP32 回传。
      required: false
      selector:
        text:
    device_id:
      name: 设备 ID
      description: 语音卫星或播放器设备 ID。没有 pending_id 时用于匹配最近追问。
      required: false
      selector:
        text:
    conversation_id:
      name: 对话 ID
      description: 原始 conversation_id。没有 pending_id 时用于匹配最近追问。
      required: false
      selector:
        text:

record_habit_event:
  name: 记录习惯事件
  description: 手动记录一次习惯学习观察，用于调试或外部自动化接入。
  fields:
    domain:
      name: 服务域
      description: 例如 climate、light、switch。
      required: true
      selector:
        text:
    service:
      name: 服务
      description: 例如 turn_on、turn_off、set_temperature。
      required: true
      selector:
        text:
    entity_id:
      name: 实体
      description: 被操作的实体。
      required: true
      selector:
        entity:
    device_id:
      name: 设备 ID
      description: 发起操作的语音设备或上下文设备。
      required: false
      selector:
        text:
    source:
      name: 来源
      description: 事件来源标记。
      required: false
      default: manual
      selector:
        text:

get_proactive_status:
  name: 获取主动助手状态
  description: 返回短期追问上下文、习惯学习候选和当前配置。
  fields: {}
