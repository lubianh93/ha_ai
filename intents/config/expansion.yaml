# 扩展规则 - 动词、参数、变量定义
# 注意: 此文件定义用于意图匹配的扩展规则
# 与 local_control.yaml 中的关键词配合使用，避免重复定义
expansion_rules:
  # 前缀后缀 - 礼貌用语
  let: "请|帮我|麻烦|给|能否|可以吗|麻烦您|劳驾|拜托|请问"
  
  # 开关动作 (基础定义，local_control.yaml 中有更完整的列表)
  turn: "打开|开启|开|启动|点亮|放亮"
  close: "关闭|关上|关|停止|熄灭|灭灯|关掉"
  set: "设置|设定|调节|调|设"

  # 全屋控制命令
  all_on: "全屋打开|全家打开|整屋打开|所有区域打开"
  all_off: "全屋关闭|全家关闭|整屋关闭|所有区域关闭"

  # 窗帘动作
  open_cover: "拉开|升起|打开"
  close_cover: "拉上|降下|关闭"

  # 参数名称
  brightness: "亮度|明亮度|光亮度"
  volume: "音量|声音|声量"
  temperature: "温度|气温|室温"
  
  # 全局范围词 - 详细列表在 local_control.yaml 的 global_keywords 中
  # 此处不再重复定义，避免验证警告

  # 数值参数范围
  brightness_level: "<1-100>"
  volume_level: "<0-100>"
  percentage: "<0-100>"
  timer_duration: "<1-60>"
  temperature_level: "<16-30>"

  # 颜色 (与 local_control.yaml 中的 color_values 对应)
  color: "红色|绿色|蓝色|黄色|白色|橙色|紫色|粉色|棕色|灰色|青色|金色|银色|彩色"

  # 核心动作动词
  action_verbs: "打开|开启|关闭|关上|启动|停止|设置|调节|切换|改成|改为|拉开|升到|拉上|降下|调整为|创建|添加|开始|取消|结束|删除|播放|收听|唱|放"

  # 功能动词
  function_verbs: "查询|查看|看看|分析|检查|观察|识别|告诉我|记住|记录|记一下|备忘|提醒我|提醒|提示我|创建|发送|做个"

  # 介词和语气词
  aux_words: "在|用|从|到|成|为|给|向|往|一下|下|这个|那个"
